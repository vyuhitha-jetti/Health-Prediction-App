<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link 
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

    <body>

{% with messages = get_flashed_messages() %}

{% if messages %}

{% for msg in messages %}

<p style="color:red; text-align:center;">
{{msg}}
</p>

{% endfor %}

{% endif %}

{% endwith %}

<h2>Add Patient Details</h2>

<form method="post">

Name:
<input name="name">

DOB:
<input type="date" name="dob">

Email:
<input name="email">

Glucose:
<input name="glucose">

Haemoglobin:
<input name="haemoglobin">

Cholesterol:
<input name="cholesterol">

<button>
Predict & Save
</button>

</form>
</body>
</html>
