<!DOCTYPE html>
<html>

<head>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link 
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">


</head>


<body class="container">


<h2>Health Prediction System</h2>


<a href="/add" class="btn btn-primary">
Add Patient
</a>


<table class="table">


<tr>

<th>Name</th>
<th>Email</th>
<th>Glucose</th>
<th>Remarks</th>
<th>Action</th>

</tr>



{% for p in patients %}

<tr>

<td>{{p.full_name}}</td>

<td>{{p.email}}</td>

<td>{{p.glucose}}</td>

<td>{{p.remarks}}</td>


<td>

<a href="/update/{{p.id}}">
Edit
</a>


<a href="/delete/{{p.id}}">
Delete
</a>

</td>


</tr>

{% endfor %}


</table>


</body>

</html>
